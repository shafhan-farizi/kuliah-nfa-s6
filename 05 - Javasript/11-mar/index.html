<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pegawai</title>
    <style>
        body {
            max-width: 550px;
            margin: 5rem auto;
            background-color: #e3e3e3;
        }
        table {
            background-color: antiquewhite;
            border-collapse: collapse;
            width: 100%;
            height: 100%;
        }
        thead {
            background-color: #343a40;
            color: white;
        }
        tbody {
            background-color: #ffffff;
        }
        tfoot {
            background-color: #343a40;
            color: white;
        }
        tr:hover {
            background-color: #e9ecef;
            color: black;
        }
        td, th {
            border: 1px solid #ddd;
        }
        td, th {
            padding: 0.5rem 2rem;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Nama Pegawai</th>
                <th>Umur</th>
                <th>Jabatan</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>dodi prayodi</td>
                <td>25 tahun</td>
                <td>Manager</td>
                <td>menikah</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total Gaji</td>
                <td colspan="3" id="gaji" align="right">0</td>
            </tr>
        </tfoot>
    </table>

    <script>
        const gajiEl = document.getElementById('gaji')

        const jabatan = 'manager'
        const status = 'menikah'

        let gapok = 0

        if(jabatan == 'manager') {
            gapok = 15000000
        }  else if(jabatan == 'asisten manager') {
            gapok = 10000000
        } else if(jabatan == 'staff') {
            gapok = 5000000
        } else {
            console.error('jabatan tidak ditemukan');
        }

        const tunjangan_jabatan = (15/100) * gapok
        const bpjs = (10/100) * gapok
        const tunjangan_keluarga = (status == 'menikah') ?  (20/100) * gapok : 0 

        const totalGaji = gapok + tunjangan_jabatan + bpjs + tunjangan_keluarga

        gajiEl.textContent = 'Rp.' + totalGaji.toLocaleString('id-ID')
    </script>
</body>
</html>
