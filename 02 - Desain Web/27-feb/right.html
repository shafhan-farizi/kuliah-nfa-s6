		<title>Link Materi</title>
        <style>
            fieldset {
                border: 2px solid #0B2D72;
                color: #0B2D72;
				border-radius: 15px;
            }
			legend {
				padding: 10px 15px;
				background-color: #0B2D72;
				color: white;
				border-radius: 20px;
			}
			ul {padding: 0;list-style: none;}
			li {
				padding-bottom: 5px;
				border-bottom: 1px solid #0B2D72;
				margin-bottom: 12px;
			}
			a {
				color: black;
				text-decoration: none;
                transition: all .2s ease-in;
			}
			a:hover {
				color: #0B2D72;
				font-weight: bold;
			}
		</style>
	</head>
