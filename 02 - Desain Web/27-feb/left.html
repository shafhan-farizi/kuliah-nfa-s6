<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Teman Instagram</title>
		<style>
            fieldset {
                border: 2px solid #0B2D72;
                color: #0B2D72;
				border-radius: 15px;
            }
			legend {
				padding: 10px 15px;
				background-color: #0B2D72;
				color: white;
				border-radius: 20px;
			}
			ul {padding: 0;list-style: none;}
			li {
				padding-bottom: 5px;
				border-bottom: 1px solid #0B2D72;
				margin-bottom: 12px;
			}
			a {
				color: black;
				text-decoration: none;
                transition: all .2s ease-in;
			}
			a:hover {
				color: #0B2D72;
				font-weight: bold;
			}
		</style>
	</head>
	<body>
		<fieldset>
			<legend>Kunjungi SosMed teman saya</legend>
			<ul>
				<li>
					<a href="https://www.instagram.com/shias.debunked/" target="_blank">Shias.debunked</a>
				</li>
				<li>
					<a href="https://www.instagram.com/attalabelard/" target="_blank">attalabelard</a>
				</li>
				<li>
					<a href="https://www.instagram.com/sahabatsurga/" target="_blank">sahabatsurga</a>
				</li>
				<li>
					<a href="https://www.instagram.com/caldruki/" target="_blank">caldruki</a>
				</li>
				<li>
					<a href="https://www.instagram.com/fedrixsakbes/" target="_blank">fedrixsakbes</a>
				</li>
			</ul>
		</fieldset>
	</body>
</html>
