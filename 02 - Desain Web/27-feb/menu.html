<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Menu Navigasi</title>
		<style>
			body {
                height: 100vh;
				margin: 0;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			a {
				font-weight: bold;
				font-family: sans-serif;
				color: #0B2D72;
				text-decoration: none;
				transition: color 0.2s ease-in;
				padding: 10px 25px;
				border: 2px solid #0B2D72;
				border-radius: 45px;
				margin: 0 10px;
				transition: all .2s ease-in;
			}
			a:hover {
				color: white;
				background-color: #0B2D72;
				transform: translateY(-3px);
				box-shadow: 0 5px 15px rgba(11, 45, 114, 0.3);
			}
		</style>
	</head>
	<body>
		<a href="home.html" target="main_frame">Home</a>
		<a href="study.html" target="main_frame">MyStudy</a>
		<a href="gallery.html" target="main_frame">Gallery</a>
	</body>
</html>
