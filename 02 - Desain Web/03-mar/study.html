<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Riwayat Pendidikan</title>
		<style>
			table {
				width: 100%;
				border-collapse: separate;
				border-spacing: 0;
				border-radius: 15px;
				overflow: hidden;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
			}
			th {
				background-color: #0b2d72;
				color: white;
				padding: 20px;
				text-transform: uppercase;
			}
			td {
				padding: 15px;
				border-bottom: 1px solid #eee;
			}
			tr:nth-child(even) {
				background-color: #f8f9fa;
			}
			tr:hover {
				background-color: #e9ecef;
			}
		</style>
	</head>
	<body>
		<table border="1">
			<thead>
				<tr>
					<th>JENJANG</th>
					<th>NAMA SEKOLAH</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>SD</td>
					<td>SDN 06 Pagi Duri Kosambi</td>
				</tr>
				<tr>
					<td>SMP</td>
					<td>SMP IT Riyadhushalihin</td>
				</tr>
				<tr>
					<td>SMA</td>
					<td>SMA Al-furqan</td>
				</tr>
				<tr>
					<td>Kuliah</td>
					<td>STT Terpadu Nurul Fikri</td>
				</tr>
			</tbody>
		</table>
	</body>
</html>
